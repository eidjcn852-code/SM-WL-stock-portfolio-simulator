  border: 0 !important;

.sr-only {

  clip: rect(0, 0, 0, 0);

.btn {

.form-control:focus-visible {

.form-control:disabled,

.form-select:focus-visible {

  margin: 0;
  border: 1px solid var(--input);
  color: var(--primary-foreground);
  background-color: transparent;
  cursor: var(--cursor-interaction, default);
  transition:

    border-color 150ms,
    box-shadow 150ms;

.form-check:not(.form-switch) .form-check-input[type=&quot;checkbox&quot;] {
  border-color: var(--input);
  border-radius: var(--radius-sm);
  corner-shape: superellipse(1.5);
  background-color: var(--secondary);
  box-shadow: var(--shadow-sm);

}

.form-check:not(.form-switch) .form-check-input:disabled {
  cursor: not-allowed;

.form-check:not(.form-switch) .form-check-input:disabled + .form-check-label {

.form-switch .form-check-input:disabled,

  height: 20px;
  border: 0;
  border-radius: var(--radius-full);

  transition: background-color 200ms cubic-bezier(0, 0, 0.2, 1);

  position: absolute;
  top: 50%;
  left: 0;
  width: 16px;
  height: 16px;
  box-sizing: border-box;

  background: light-dark(var(--primary-foreground), var(--foreground));
  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

  &lt;section aria-label=&quot;最近交易紀錄&quot;&gt;

            &lt;th class=&quot;text-end&quot;&gt;現金流&lt;/th&gt;
          &lt;/tr&gt;

          &lt;tr&gt;&lt;td colspan=&quot;5&quot; class=&quot;text-center text-muted&quot;&gt;尚無交易&lt;/td&gt;&lt;/tr&gt;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&#x27;stock-market-simulator&#x27;);
      if (!root) return;

      const el = (id) =&gt; root.querySelector(&#x27;#&#x27; + id);
      const STARTING_CASH = 1000000;
      const STARTING_PRICE = 100;
      const COMMISSION_RATE = 0.001425;
      const SELL_TAX_RATE = 0.003;
      const MAX_HISTORY = 181;

      const state = {
        day: 0,
        price: STARTING_PRICE,
        previousPrice: STARTING_PRICE,
        dailyReturn: 0,
        cash: STARTING_CASH,
        shares: 0,
        averageCost: 0,
        realizedPnl: 0,
        seed: 41873,
        history: [],
        transactions: [],
        timer: null,
        marketLabel: &#x27;市場未開盤&#x27;,
        eventText: &#x27;從第 1 天開始觀察行情&#x27;
      };

      const currency0 = new Intl.NumberFormat(&#x27;zh-TW&#x27;, {
        style: &#x27;currency&#x27;, currency: &#x27;TWD&#x27;, maximumFractionDigits: 0
      });
      const currency2 = new Intl.NumberFormat(&#x27;zh-TW&#x27;, {
        style: &#x27;currency&#x27;, currency: &#x27;TWD&#x27;, minimumFractionDigits: 2, maximumFractionDigits: 2
      });
      const number0 = new Intl.NumberFormat(&#x27;zh-TW&#x27;, { maximumFractionDigits: 0 });

      function totalAssets() {
        return state.cash + state.shares * state.price;
      }

      function unrealizedPnl() {
        return state.shares * (state.price - state.averageCost);
      }

      function signedPercent(value) {
        const sign = value &gt; 0 ? &#x27;+&#x27; : &#x27;&#x27;;
        return sign + value.toFixed(2) + &#x27;%&#x27;;
      }

      function signedMoney(value) {
        const sign = value &gt; 0 ? &#x27;+&#x27; : &#x27;&#x27;;
        return sign + currency0.format(value);
      }

      function seededRandom() {
        state.seed = (state.seed * 1664525 + 1013904223) &gt;&gt;&gt; 0;
        return state.seed / 4294967296;
      }

      function normalRandom() {
        const u = Math.max(seededRandom(), 0.000001);
        const v = Math.max(seededRandom(), 0.000001);
        return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
      }

      function calculateReturn(nextDay) {
        const scenario = el(&#x27;sms-scenario&#x27;).value;
        const volatility = Number(el(&#x27;sms-volatility&#x27;).value) / 100;
        let drift = 0;

        if (scenario === &#x27;crash&#x27;) {
          const phase = ((nextDay - 1) % 45) + 1;
          if (phase &lt;= 8) drift = -0.043;
          else if (phase &lt;= 18) drift = 0.033;
          else drift = 0.001;
        } else if (scenario === &#x27;bull&#x27;) {
          drift = 0.008;
          if (nextDay % 13 === 0) drift -= 0.045;
        } else if (scenario === &#x27;bear&#x27;) {
          drift = -0.007;
          if (nextDay % 11 === 0) drift += 0.04;
        } else {
          drift = Math.sin(nextDay * 1.7) * volatility * 0.35;
          if (nextDay % 7 === 0) drift += seededRandom() &gt; 0.5 ? 0.07 : -0.07;
        }

        const result = drift + normalRandom() * volatility * 0.62;
        return Math.max(-0.18, Math.min(0.18, result));
      }

      function describeMarket(change) {
        if (change &gt;= 0.08) return [&#x27;跳空大漲&#x27;, &#x27;買盤湧入，市場情緒快速升溫&#x27;];
        if (change &gt;= 0.03) return [&#x27;強勢上漲&#x27;, &#x27;指數放量走高，多方掌握節奏&#x27;];
        if (change &lt;= -0.08) return [&#x27;恐慌重挫&#x27;, &#x27;賣壓集中出籠，價格快速下探&#x27;];
        if (change &lt;= -0.03) return [&#x27;快速下跌&#x27;, &#x27;風險偏好降溫，市場承受賣壓&#x27;];
        if (change &gt; 0.006) return [&#x27;小幅走高&#x27;, &#x27;買賣拉鋸後略偏多方&#x27;];
        if (change &lt; -0.006) return [&#x27;小幅走低&#x27;, &#x27;盤勢震盪，賣方略占上風&#x27;];
        return [&#x27;震盪整理&#x27;, &#x27;多空力量接近，行情窄幅波動&#x27;];
      }

      function recordHistory() {
        const entry = {
          day: state.day,
          price: state.price,
          assets: totalAssets(),
          priceReturn: (state.price / STARTING_PRICE - 1) * 100,
          assetReturn: (totalAssets() / STARTING_CASH - 1) * 100
        };
        const last = state.history[state.history.length - 1];
        if (last &amp;&amp; last.day === state.day) state.history[state.history.length - 1] = entry;
        else state.history.push(entry);
        if (state.history.length &gt; MAX_HISTORY) state.history.shift();
      }

      function advanceDay() {
        state.previousPrice = state.price;
        state.day += 1;
        state.dailyReturn = calculateReturn(state.day);
        state.price = Math.max(5, state.price * (1 + state.dailyReturn));
        const description = describeMarket(state.dailyReturn);
        state.marketLabel = description[0];
        state.eventText = description[1];
        recordHistory();
        render();
      }

      function tradeFee(gross) {
        return Math.max(20, Math.round(gross * COMMISSION_RATE));
      }

      function getQuantity() {
        const value = Math.floor(Number(el(&#x27;sms-quantity&#x27;).value));
        if (!Number.isFinite(value) || value &lt; 1) return 0;
        return value;
      }

      function updateCurrentHistory() {
        recordHistory();
        render();
      }

      function buy() {
        const quantity = getQuantity();
        if (!quantity) {
          showFeedback(&#x27;請輸入大於 0 的交易股數&#x27;, true);
          return;
        }
        const gross = quantity * state.price;
        const fee = tradeFee(gross);
        const total = gross + fee;
        if (total &gt; state.cash) {
          showFeedback(&#x27;現金不足，目前最多可買進 &#x27; + number0.format(maxAffordableShares()) + &#x27; 股&#x27;, true);
          return;
        }
        const previousBookCost = state.averageCost * state.shares;
        state.cash -= total;
        state.shares += quantity;
        state.averageCost = (previousBookCost + total) / state.shares;
        state.transactions.unshift({
          day: state.day, type: &#x27;買進&#x27;, quantity, price: state.price, cashFlow: -total
        });
        showFeedback(&#x27;已買進 &#x27; + number0.format(quantity) + &#x27; 股，含手續費 &#x27; + currency0.format(fee), false);
        updateCurrentHistory();
      }

      function sell() {
        const quantity = getQuantity();
        if (!quantity) {
          showFeedback(&#x27;請輸入大於 0 的交易股數&#x27;, true);
          return;
        }
        if (quantity &gt; state.shares) {
          showFeedback(&#x27;持股不足，目前可賣出 &#x27; + number0.format(state.shares) + &#x27; 股&#x27;, true);
          return;
        }
        const gross = quantity * state.price;
        const fee = tradeFee(gross);
        const tax = Math.round(gross * SELL_TAX_RATE);
        const proceeds = gross - fee - tax;
        const realized = (state.price - state.averageCost) * quantity - fee - tax;
        state.cash += proceeds;
        state.shares -= quantity;
        state.realizedPnl += realized;
        if (state.shares === 0) state.averageCost = 0;
        state.transactions.unshift({
          day: state.day, type: &#x27;賣出&#x27;, quantity, price: state.price, cashFlow: proceeds
        });
        showFeedback(&#x27;已賣出 &#x27; + number0.format(quantity) + &#x27; 股，本次損益 &#x27; + signedMoney(realized), false);
        updateCurrentHistory();
      }

      function maxAffordableShares() {
        if (state.cash &lt;= 20) return 0;
        return Math.max(0, Math.floor((state.cash - 20) / (state.price * (1 + COMMISSION_RATE))));
      }

      function showFeedback(message, destructive) {
        const feedback = el(&#x27;sms-feedback&#x27;);
        feedback.textContent = message;
        feedback.classList.toggle(&#x27;text-destructive&#x27;, destructive);
      }

      function setAutoPlaying(playing) {
        const button = el(&#x27;sms-auto&#x27;);
        if (playing) {
          if (state.timer) return;
          state.timer = window.setInterval(advanceDay, 700);
        } else if (state.timer) {
          window.clearInterval(state.timer);
          state.timer = null;
        }
        button.setAttribute(&#x27;aria-pressed&#x27;, playing ? &#x27;true&#x27; : &#x27;false&#x27;);
        button.innerHTML = playing
          ? &#x27;&lt;i data-lucide=&quot;pause&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;span&gt;暫停&lt;/span&gt;&#x27;
          : &#x27;&lt;i data-lucide=&quot;play&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;span&gt;自動播放&lt;/span&gt;&#x27;;
        if (window.lucide) window.lucide.createIcons({ attrs: { width: 16, height: 16 } });
      }

      function resetSimulation() {
        setAutoPlaying(false);
        state.day = 0;
        state.price = STARTING_PRICE;
        state.previousPrice = STARTING_PRICE;
        state.dailyReturn = 0;
        state.cash = STARTING_CASH;
        state.shares = 0;
        state.averageCost = 0;
        state.realizedPnl = 0;
        state.seed = 41873;
        state.history = [];
        state.transactions = [];
        state.marketLabel = &#x27;市場未開盤&#x27;;
        state.eventText = &#x27;從第 1 天開始觀察行情&#x27;;
        recordHistory();
        showFeedback(&#x27;目前可買進 &#x27; + number0.format(maxAffordableShares()) + &#x27; 股&#x27;, false);
        render();
      }

      function renderSummary() {
        el(&#x27;sms-price&#x27;).textContent = currency2.format(state.price);
        el(&#x27;sms-daily-return&#x27;).textContent = &#x27;第 &#x27; + state.day + &#x27; 天 · &#x27; + signedPercent(state.dailyReturn * 100);
        el(&#x27;sms-total-assets&#x27;).textContent = currency0.format(totalAssets());
        el(&#x27;sms-cash&#x27;).textContent = &#x27;現金 &#x27; + currency0.format(state.cash);
        el(&#x27;sms-position&#x27;).textContent = number0.format(state.shares) + &#x27; 股&#x27;;
        const average = state.shares ? &#x27; · 均價 &#x27; + currency2.format(state.averageCost) : &#x27;&#x27;;
        el(&#x27;sms-pnl&#x27;).textContent = &#x27;未實現 &#x27; + signedMoney(unrealizedPnl()) + &#x27; · 已實現 &#x27; + signedMoney(state.realizedPnl) + average;
        el(&#x27;sms-market-state&#x27;).textContent = state.marketLabel;
        el(&#x27;sms-event&#x27;).textContent = state.eventText;
      }

      function renderTransactions() {
        const body = el(&#x27;sms-transactions&#x27;);
        if (!state.transactions.length) {
          body.innerHTML = &#x27;&lt;tr&gt;&lt;td colspan=&quot;5&quot; class=&quot;text-center text-muted&quot;&gt;尚無交易&lt;/td&gt;&lt;/tr&gt;&#x27;;
          return;
        }
        body.innerHTML = state.transactions.slice(0, 6).map((transaction) =&gt; {
          const actionClass = transaction.type === &#x27;買進&#x27; ? &#x27;sms-buy&#x27; : &#x27;sms-sell&#x27;;
          const flow = (transaction.cashFlow &gt; 0 ? &#x27;+&#x27; : &#x27;&#x27;) + currency0.format(transaction.cashFlow);
          return &#x27;&lt;tr&gt;&#x27; +
            &#x27;&lt;td class=&quot;text-nowrap&quot;&gt;第 &#x27; + transaction.day + &#x27; 天&lt;/td&gt;&#x27; +
            &#x27;&lt;td class=&quot;&#x27; + actionClass + &#x27;&quot;&gt;&#x27; + transaction.type + &#x27;&lt;/td&gt;&#x27; +
            &#x27;&lt;td class=&quot;text-end&quot;&gt;&#x27; + number0.format(transaction.quantity) + &#x27;&lt;/td&gt;&#x27; +
            &#x27;&lt;td class=&quot;text-end&quot;&gt;&#x27; + currency2.format(transaction.price) + &#x27;&lt;/td&gt;&#x27; +
            &#x27;&lt;td class=&quot;text-end&quot;&gt;&#x27; + flow + &#x27;&lt;/td&gt;&#x27; +
          &#x27;&lt;/tr&gt;&#x27;;
        }).join(&#x27;&#x27;);
      }

      function chartGeometry() {
        const svg = el(&#x27;sms-chart&#x27;);
        const width = Math.max(300, Math.round(svg.getBoundingClientRect().width || 720));
        const height = svg.getBoundingClientRect().height || 300;
        svg.setAttribute(&#x27;viewBox&#x27;, &#x27;0 0 &#x27; + width + &#x27; &#x27; + height);
        return { width, height, left: 48, right: 18, top: 18, bottom: 36 };
      }

      function renderChart() {
        const geometry = chartGeometry();
        const { width, height, left, right, top, bottom } = geometry;
        const plotWidth = Math.max(1, width - left - right);
        const plotHeight = Math.max(1, height - top - bottom);
        const values = state.history.flatMap((point) =&gt; [point.priceReturn, point.assetReturn]);
        let minValue = Math.min(0, ...values);
        let maxValue = Math.max(0, ...values);
        const spread = Math.max(6, maxValue - minValue);
        minValue -= spread * 0.12;
        maxValue += spread * 0.12;

        const xAt = (index) =&gt; left + (state.history.length &lt;= 1 ? 0 : index / (state.history.length - 1)) * plotWidth;
        const yAt = (value) =&gt; top + ((maxValue - value) / (maxValue - minValue)) * plotHeight;
        const pathFor = (key) =&gt; state.history.map((point, index) =&gt;
          (index === 0 ? &#x27;M&#x27; : &#x27;L&#x27;) + xAt(index).toFixed(2) + &#x27;,&#x27; + yAt(point[key]).toFixed(2)
        ).join(&#x27; &#x27;);

        el(&#x27;sms-price-line&#x27;).setAttribute(&#x27;d&#x27;, pathFor(&#x27;priceReturn&#x27;));
        el(&#x27;sms-assets-line&#x27;).setAttribute(&#x27;d&#x27;, pathFor(&#x27;assetReturn&#x27;));

        const lastIndex = state.history.length - 1;
        const latest = state.history[lastIndex];
        const lastX = xAt(lastIndex);
        const priceY = yAt(latest.priceReturn);
        const assetsY = yAt(latest.assetReturn);
        el(&#x27;sms-price-dot&#x27;).setAttribute(&#x27;cx&#x27;, lastX);
        el(&#x27;sms-price-dot&#x27;).setAttribute(&#x27;cy&#x27;, priceY);
        el(&#x27;sms-assets-dot&#x27;).setAttribute(&#x27;cx&#x27;, lastX);
        el(&#x27;sms-assets-dot&#x27;).setAttribute(&#x27;cy&#x27;, assetsY);

        const grid = [];
        for (let index = 0; index &lt; 5; index += 1) {
          const ratio = index / 4;
          const y = top + ratio * plotHeight;
          const value = maxValue - ratio * (maxValue - minValue);
          grid.push(&#x27;&lt;line class=&quot;sms-grid-line&quot; x1=&quot;&#x27; + left + &#x27;&quot; x2=&quot;&#x27; + (width - right) + &#x27;&quot; y1=&quot;&#x27; + y + &#x27;&quot; y2=&quot;&#x27; + y + &#x27;&quot;&gt;&lt;/line&gt;&#x27;);
          grid.push(&#x27;&lt;text class=&quot;sms-axis-text&quot; x=&quot;&#x27; + (left - 8) + &#x27;&quot; y=&quot;&#x27; + (y + 4) + &#x27;&quot; text-anchor=&quot;end&quot;&gt;&#x27; + signedPercent(value) + &#x27;&lt;/text&gt;&#x27;);
        }
        const firstDay = state.history[0].day;
        const middleDay = state.history[Math.floor(lastIndex / 2)].day;
        grid.push(&#x27;&lt;line class=&quot;sms-axis-line&quot; x1=&quot;&#x27; + left + &#x27;&quot; x2=&quot;&#x27; + (width - right) + &#x27;&quot; y1=&quot;&#x27; + (height - bottom) + &#x27;&quot; y2=&quot;&#x27; + (height - bottom) + &#x27;&quot;&gt;&lt;/line&gt;&#x27;);
        grid.push(&#x27;&lt;text class=&quot;sms-axis-text&quot; x=&quot;&#x27; + left + &#x27;&quot; y=&quot;&#x27; + (height - 10) + &#x27;&quot;&gt;第 &#x27; + firstDay + &#x27; 天&lt;/text&gt;&#x27;);
        if (lastIndex &gt; 1) grid.push(&#x27;&lt;text class=&quot;sms-axis-text&quot; x=&quot;&#x27; + xAt(Math.floor(lastIndex / 2)) + &#x27;&quot; y=&quot;&#x27; + (height - 10) + &#x27;&quot; text-anchor=&quot;middle&quot;&gt;第 &#x27; + middleDay + &#x27; 天&lt;/text&gt;&#x27;);
        grid.push(&#x27;&lt;text class=&quot;sms-axis-text&quot; x=&quot;&#x27; + (width - right) + &#x27;&quot; y=&quot;&#x27; + (height - 10) + &#x27;&quot; text-anchor=&quot;end&quot;&gt;第 &#x27; + latest.day + &#x27; 天&lt;/text&gt;&#x27;);
        el(&#x27;sms-chart-grid&#x27;).innerHTML = grid.join(&#x27;&#x27;);

        const hit = el(&#x27;sms-chart-hit&#x27;);
        hit.setAttribute(&#x27;x&#x27;, left);
        hit.setAttribute(&#x27;y&#x27;, top);
        hit.setAttribute(&#x27;width&#x27;, plotWidth);
        hit.setAttribute(&#x27;height&#x27;, plotHeight);

        el(&#x27;sms-chart&#x27;).dataset.left = left;
        el(&#x27;sms-chart&#x27;).dataset.plotWidth = plotWidth;
        el(&#x27;sms-chart&#x27;).dataset.top = top;
        el(&#x27;sms-chart&#x27;).dataset.bottomY = height - bottom;
        el(&#x27;sms-chart&#x27;).dataset.minValue = minValue;
        el(&#x27;sms-chart&#x27;).dataset.maxValue = maxValue;
        el(&#x27;sms-selected-point&#x27;).textContent = &#x27;第 &#x27; + latest.day + &#x27; 天 · 股價 &#x27; + signedPercent(latest.priceReturn) + &#x27; · 資產 &#x27; + signedPercent(latest.assetReturn);
      }

      function showChartPoint(event) {
        const svg = el(&#x27;sms-chart&#x27;);
        const rect = svg.getBoundingClientRect();
        const left = Number(svg.dataset.left);
        const plotWidth = Number(svg.dataset.plotWidth);
        const localX = ((event.clientX - rect.left) / rect.width) * svg.viewBox.baseVal.width;
        const ratio = Math.max(0, Math.min(1, (localX - left) / plotWidth));
        const index = Math.round(ratio * (state.history.length - 1));
        const point = state.history[index];
        const x = left + (state.history.length &lt;= 1 ? 0 : index / (state.history.length - 1)) * plotWidth;
        const hoverLine = el(&#x27;sms-hover-line&#x27;);
        hoverLine.setAttribute(&#x27;x1&#x27;, x);
        hoverLine.setAttribute(&#x27;x2&#x27;, x);
        hoverLine.setAttribute(&#x27;y1&#x27;, svg.dataset.top);
        hoverLine.setAttribute(&#x27;y2&#x27;, svg.dataset.bottomY);
        hoverLine.setAttribute(&#x27;visibility&#x27;, &#x27;visible&#x27;);

        const tooltip = el(&#x27;sms-tooltip&#x27;);
        tooltip.innerHTML = &#x27;&lt;strong&gt;第 &#x27; + point.day + &#x27; 天&lt;/strong&gt;&lt;br&gt;股價 &#x27; + currency2.format(point.price) + &#x27; (&#x27; + signedPercent(point.priceReturn) + &#x27;)&lt;br&gt;總資產 &#x27; + currency0.format(point.assets) + &#x27; (&#x27; + signedPercent(point.assetReturn) + &#x27;)&#x27;;
        tooltip.style.display = &#x27;block&#x27;;
        const wrap = el(&#x27;sms-chart-wrap&#x27;);
        const xCss = (x / svg.viewBox.baseVal.width) * rect.width;
        const tooltipWidth = tooltip.getBoundingClientRect().width;
        tooltip.style.left = Math.max(4, Math.min(wrap.clientWidth - tooltipWidth - 4, xCss + 10)) + &#x27;px&#x27;;
        tooltip.style.top = &#x27;8px&#x27;;
        el(&#x27;sms-selected-point&#x27;).textContent = &#x27;第 &#x27; + point.day + &#x27; 天 · 股價 &#x27; + signedPercent(point.priceReturn) + &#x27; · 資產 &#x27; + signedPercent(point.assetReturn);
      }

      function hideChartPoint() {
        el(&#x27;sms-hover-line&#x27;).setAttribute(&#x27;visibility&#x27;, &#x27;hidden&#x27;);
        el(&#x27;sms-tooltip&#x27;).style.display = &#x27;none&#x27;;
        const latest = state.history[state.history.length - 1];
        el(&#x27;sms-selected-point&#x27;).textContent = &#x27;第 &#x27; + latest.day + &#x27; 天 · 股價 &#x27; + signedPercent(latest.priceReturn) + &#x27; · 資產 &#x27; + signedPercent(latest.assetReturn);
      }

      function render() {
        renderSummary();
        renderTransactions();
        renderChart();
      }

      el(&#x27;sms-next-day&#x27;).addEventListener(&#x27;click&#x27;, advanceDay);
      el(&#x27;sms-auto&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; setAutoPlaying(!state.timer));
      el(&#x27;sms-reset&#x27;).addEventListener(&#x27;click&#x27;, resetSimulation);
      el(&#x27;sms-buy&#x27;).addEventListener(&#x27;click&#x27;, buy);
      el(&#x27;sms-sell&#x27;).addEventListener(&#x27;click&#x27;, sell);
      el(&#x27;sms-volatility&#x27;).addEventListener(&#x27;input&#x27;, (event) =&gt; {
        el(&#x27;sms-volatility-value&#x27;).textContent = event.target.value + &#x27;%&#x27;;
      });
      el(&#x27;sms-scenario&#x27;).addEventListener(&#x27;change&#x27;, () =&gt; {
        state.marketLabel = &#x27;情境已切換&#x27;;
        state.eventText = &#x27;新情境將從下一交易日開始影響行情&#x27;;
        renderSummary();
      });
      el(&#x27;sms-chart-hit&#x27;).addEventListener(&#x27;pointermove&#x27;, showChartPoint);
      el(&#x27;sms-chart-hit&#x27;).addEventListener(&#x27;pointerleave&#x27;, hideChartPoint);

      let resizeFrame = null;
      const resizeObserver = new ResizeObserver(() =&gt; {
        if (resizeFrame) cancelAnimationFrame(resizeFrame);
        resizeFrame = requestAnimationFrame(renderChart);
      });
      resizeObserver.observe(el(&#x27;sms-chart&#x27;));

      recordHistory();
      render();
      showFeedback(&#x27;目前可買進 &#x27; + number0.format(maxAffordableShares()) + &#x27; 股&#x27;, false);
    })();
  &lt;/script&gt;
&lt;/div&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }

    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );

      window.clearTimeout(openTimeout);

    }

  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }

    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();

&lt;script&gt;
(() =&gt; {
  const initialize = () =&gt; {
